# Production Docker Compose stack for OpenMasjid.
#
#   app   - Next.js + Payload (standalone build, non-root, port 3000 internal)
#   db    - Postgres 16 (persistent pgdata volume)
#   cron  - Alpine crond sidecar that ticks /api/payload-jobs/run every minute
#
# Expected to sit behind an external reverse proxy (Nginx Proxy Manager
# running on a different host on the LAN, in its own compose stack). The app
# publishes port 3000 on the host's LAN interface so NPM can reach it by IP.
#
# Media uploads live in `public/media` inside the container; a host/TrueNAS
# bind mount survives container rebuilds. See README "Deploying with Docker".

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-openmasjid}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: openmasjid/app:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      # Publish on the LAN so an off-box NPM can proxy to http://<host-ip>:3000.
      # Use APP_BIND=127.0.0.1 to restrict to localhost only (e.g. when NPM
      # runs on the same machine).
      - "${APP_BIND:-0.0.0.0}:3000:3000"
    volumes:
      # Host/TrueNAS mount for uploaded media. Point MEDIA_PATH at a local
      # directory OR an NFS-mounted share. Default: ./media (host).
      - ${MEDIA_PATH:-./media}:/app/public/media

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    env_file: .env
    command: >
      sh -c "apk add --no-cache curl tzdata >/dev/null &&
      echo '* * * * * curl -fsS -X POST http://app:3000/api/payload-jobs/run -H \"X-Cron-Secret: $$CRON_SECRET\" >> /proc/1/fd/1 2>&1' > /etc/crontabs/root &&
      crond -f -L /dev/stdout"

volumes:
  pgdata:
